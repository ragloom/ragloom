name: publish-crate

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      tag:
        required: true
        type: string
      ref:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Crate version from Cargo.toml (for example 0.1.0)
        required: true
        type: string
      tag:
        description: Release tag to verify before publishing (for example v0.1.0)
        required: true
        type: string
      ref:
        description: Git ref to checkout before publishing (for example v0.1.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify release version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ inputs.tag }}
        run: python .github/scripts/verify-release-version.py

      - name: Package crate
        run: cargo package

      - name: Dry-run publish
        run: cargo publish --dry-run

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
