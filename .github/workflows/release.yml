name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Crate version from Cargo.toml (for example 0.1.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.verify.outputs.version }}
      tag: ${{ steps.verify.outputs.tag }}
      release_ref: ${{ steps.plan.outputs.release_ref }}
      create_tag: ${{ steps.plan.outputs.create_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify release version
        id: verify
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: python .github/scripts/verify-release-version.py

      - name: Plan release ref
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "release_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
          fi

  deep-quality:
    name: deep-quality
    needs: prepare-release
    uses: ./.github/workflows/quality-deep.yml

  release-binaries:
    name: release-binaries (${{ matrix.target }})
    needs:
      - prepare-release
      - deep-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ragloom
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: ragloom
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ragloom.exe
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: ragloom
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: ragloom
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.target }}/"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/${{ matrix.target }}
          output-file: sbom-${{ matrix.target }}.spdx.json

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "dist/${{ matrix.target }}"
          sha256sum "${{ matrix.binary_name }}" > "../../checksums-${{ matrix.target }}.txt"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.target }}
            sbom-${{ matrix.target }}.spdx.json
            checksums-${{ matrix.target }}.txt

  publish-release:
    name: publish-release
    needs:
      - prepare-release
      - release-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}
          fetch-depth: 0

      - name: Create release tag
        if: needs.prepare-release.outputs.create_tag == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.release_ref }}
          generate_release_notes: true
          files: release-artifacts/**/*

  publish-crate:
    name: publish-crate
    needs:
      - prepare-release
      - publish-release
    uses: ./.github/workflows/publish-crate.yml
    with:
      version: ${{ needs.prepare-release.outputs.version }}
      tag: ${{ needs.prepare-release.outputs.tag }}
      ref: ${{ needs.prepare-release.outputs.tag }}
    secrets: inherit
