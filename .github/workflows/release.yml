name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deep-quality:
    name: deep-quality
    uses: ./.github/workflows/quality-deep.yml

  release-binaries:
    name: release-binaries (${{ matrix.target }})
    needs: deep-quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: ragloom
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary_name: ragloom
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: ragloom.exe
          - os: macos-13
            target: x86_64-apple-darwin
            binary_name: ragloom
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: ragloom
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.target }}/"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist/${{ matrix.target }}
          output-file: sbom-${{ matrix.target }}.spdx.json

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd "dist/${{ matrix.target }}"
          sha256sum "${{ matrix.binary_name }}" > "../../checksums-${{ matrix.target }}.txt"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/${{ matrix.target }}
            sbom-${{ matrix.target }}.spdx.json
            checksums-${{ matrix.target }}.txt

  publish-release:
    name: publish-release
    needs: release-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*

  publish-crate:
    name: publish-crate
    needs: publish-release
    uses: ./.github/workflows/publish-crate.yml
    secrets: inherit
