name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels: ["bug", "needs triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill out the information below to help us reproduce and fix the issue.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues to avoid duplicates.
          required: true
        - label: I have read the documentation.
          required: true
        - label: I can reproduce this issue with the latest version.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: Clearly describe what went wrong.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the minimal steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or error messages
      description: Paste relevant logs, screenshots, stack traces, or error output.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version, commit, or branch are you using?
      placeholder: "v1.2.3 / main / commit hash"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this happen?
      options:
        - macOS
        - Linux
        - Windows
        - iOS
        - Android
        - Browser
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context that may help us understand the issue.
    validations:
      required: false